[package]
name = "wf"
version = "0.1.0"
edition = "2021"
description = "Unified Workflow CLI — a high-performance, unified rewrite of the Python-based workflow tools"
license = "MIT"

[[bin]]
name = "wf"
path = "src/main.rs"

[dependencies]
# CLI argument parsing — replaces yazap
clap = { version = "4", features = ["derive", "env", "wrap_help"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Configuration — TOML v1.0 only
serde = { version = "1", features = ["derive"] }
toml = "0.8"

# Cryptography (RustCrypto ecosystem)
# AEAD ciphers
aes-gcm = "0.10"
chacha20poly1305 = "0.10"
# Key derivation
pbkdf2 = "0.12"
argon2 = "0.5"
# Digest primitives
sha2 = "0.10"
sha3 = "0.10"
blake2 = "0.10"
# Encoding
base64 = "0.22"
# CSPRNG
rand = "0.8"

# Logging
log = "0.4"

[dev-dependencies]
tempfile = "3"
